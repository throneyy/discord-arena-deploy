// discord_arena.cfg — place in cfg/sourcemod/ on your game server
// Set these values before each match via RCON or this config file.

// Discord Arena API base URL (no trailing slash)
da_api_url "https://your-railway-app.up.railway.app"

// HMAC secret — must match GAME_SERVER_HMAC_SECRET in your .env
da_hmac_secret "your_shared_hmac_secret_here"

// Match ID — set this via RCON before each match starts:
//   rcon da_match_id "clxxxxxxxxxxxxxxxxxx"
da_match_id ""
